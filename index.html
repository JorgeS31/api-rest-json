<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherApp - Clima Global | Jorge Sandoval</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="d-flex flex-column min-vh-100">
    
    <!-- Navbar dinámico -->
    <div id="navbar"></div>
    
    <!-- Contenido principal -->
    <main class="container my-4 flex-grow-1">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                
                <!-- IP del cliente -->
                <div class="alert alert-info shadow-sm d-flex align-items-center" role="alert">
                    <i class="bi bi-globe2 me-2 fs-5"></i>
                    <span id="ipAddress">Cargando IP...</span>
                </div>

                <!-- Buscador de ciudad -->
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h2 class="card-title h4 mb-3">
                            <i class="bi bi-search"></i> Buscar Ciudad
                        </h2>
                        <div class="row g-3">
                            <div class="col-md-8">
                                <select id="citySelect" class="form-select" aria-label="Seleccionar ciudad">
                                    <option value="">🌍 Selecciona una ciudad...</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <button id="searchBtn" class="btn btn-primary w-100" disabled>
                                    <i class="bi bi-cloud-sun"></i> Ver Clima
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Resultados del clima -->
                <div id="weatherContainer"></div>
                
            </div>
        </div>
    </main>

    <!-- Footer dinámico -->
    <div id="footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Main JS Module -->
    <script type="module" src="/js/main.js"></script>
</body>
</html>
